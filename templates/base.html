<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PM System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/animations.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/"><i class="bi bi-kanban"></i> PM System</a>
      <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <span class="nav-link text-white-50 small">{{ user.username }} <span class="badge bg-warning text-dark">{{ user.get_role_display }}</span></span>
          <a class="nav-link" href="/projects/">Проекты</a>
          <a class="nav-link" href="/tasks/">Задачи</a>
          <a href="/logout/" class="btn btn-sm btn-outline-light ms-2">Выйти</a>
        {% else %}
          <a class="nav-link" href="/login/">Войти</a>
        {% endif %}
      </div>
    </div>
  </nav>
  
  {% if messages %}
  <div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm animate-fade" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
  
  <main class="container py-4">{% block content %}{% endblock %}</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
