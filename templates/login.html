{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow"><div class="card-body p-4">
      <h3 class="text-center mb-4">Вход</h3>
      <form method="post">{% csrf_token %}
        <input type="text" name="username" class="form-control mb-3" placeholder="Логин" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>
      {% if messages %}{% for msg in messages %}<div class="alert alert-danger mt-3">{{ msg }}</div>{% endfor %}{% endif %}
    </div></div>
  </div>
</div>
{% endblock %}
